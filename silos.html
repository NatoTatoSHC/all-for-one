                </div>
                <div class="each" id="MOD8SGG">

                <div class="each" id="MOD8SGU">

        <script>

                if (silo.status == "Loaded") {
                        status.style.backgroundColor = "limegreen";
                    } else if (silo.status == "Dirty") {
                        status.style.backgroundColor = "brown";
                    }
            }
            let client = window.supabase.createClient("https://jgjdxlulszliepzrhgff.supabase.co", "sb_publishable_JUr3sNI84pNyl30pzxD-dA_bvZhy1w3");
            async function main() {
                const {data, error} = await client.from("silos").select("*").order("silo");
                console.log(data);
                data.forEach(silo => {
                    let item = document.createElement("div");
                    item.className = "silobox";

                    let name = document.createElement("div");
                    name.className = "silosec";
                    name.innerHTML = silo.silo;
                    name.style = "text-align: center; border-radius: 10px; background-color: whitesmoke;"
                    item.appendChild(name);

                    let status = document.createElement("div");
                    status.className = "silosec";
                    status.innerHTML = silo.status;
                    status.style = "text-align: center; border-radius: 10px;"
                    if (silo.status == "Loaded") {
                        status.style.backgroundColor = "limegreen";
                    } else if (silo.status == "Dirty") {
                        status.style.backgroundColor = "brown";
                    }
                    item.appendChild(status);

                    let missle = document.createElement("div");
                    missle.className = "silosec";
                    missle.innerHTML = silo.missle;
                    missle.style = "text-align: center; border-radius: 10px; background-color: whitesmoke;"
                    item.appendChild(missle);

                    document.querySelector("#"+silo.silo.slice(0, 7)).appendChild(item);
                    
                });
            }
            main();
        </script>
    </body>
</html>
